# Build release tarballs on real OS/arch runners so asset names match binaries.
# Do not repackage a macOS build as aarch64-unknown-linux-gnu — Linux installs need ELF.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

defaults:
  run:
    shell: bash
    working-directory: cli

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps (OpenSSL for reqwest native-tls)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cargo build --release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package tarball
        env:
          TARGET: ${{ matrix.target }}
          COPYFILE_DISABLE: "1"
        run: |
          cp "target/${TARGET}/release/pipelog" pipelog
          chmod +x pipelog
          tar czf "pipelog-${TARGET}.tar.gz" pipelog

      - uses: actions/upload-artifact@v4
        with:
          name: asset-${{ matrix.target }}
          path: cli/pipelog-${{ matrix.target }}.tar.gz

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
          pattern: asset-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: assets/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
